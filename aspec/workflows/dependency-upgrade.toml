title = "Dependency Upgrade"

[[step]]
name = "security-audit"
prompt = "Using the package manager or language toolchain appropriate for this project, check if any of the project's dependencies have any security issues (cargo/npm audit etc). If any security issues exist, upgrade the affected dependencies even if it requires a significant change to the codebase. Do not stop until all dependency security issues are dealt with."

[[step]]
name = "version-audit"
depends_on = ["security-audit"]
prompt = "Now that security-sensitive dependency upgrades are complete, review the project dependencies for available updates. Perform minor/simple updates without asking and run tests to ensure nothing breaks. If any major/breaking updates are available, list them all in a table and describe what would be required to support them, let me choose which to apply."
