title = "Implement Hard Feature Workflow"
overlays = ["context(workflow)"]

[[step]]
name = "review-plan"
agent = "codex"
prompt = """
Review the implementation plan for work item {{work_item_number}} for correctness, adherence to the grand architecture, design, security, quality, test coverage, and clarity. Address any issues you find, editing only the work item's markdown and nothing else. Do not change the functionality or spirit of the work item, only address concrete problems that would affect code quality, correctness, or security.
"""

[[step]]
name = "implement"
depends_on = ["review-plan"]
model = "claude-opus-4-8"
prompt = """
Implement work item {{work_item_number}}, adhering strongly to its implementation plan. Iterate until the work item is comprehensively implemented, the build succeeds, and all existing tests pass. DO NOT write any new tests yet, just fix any you break. New tests will be implemented in the next step. Do not write or change any docs yet, that will happen in a future step.

Be sure to double check your work against the work item implementation spec.
"""

[[step]]
name = "tests"
depends_on = ["implement"]
model = "claude-sonnet-4-6"
prompt = """
Implement tests for work item {{work_item_number}} as described in the project aspec and the work item test considerations below:

{{work_item_section:[Test Considerations]}}
"""

[[step]]
name = "docs"
model = "claude-sonnet-4-6"
depends_on = ["implement"]
prompt = """
Write comprehensive documentation for work item {{work_item_number}}, following the plan that was previously written and following guidelines from the project aspec.
"""

[[step]]
name = "review"
depends_on = ["docs", "tests"]
model = "claude-fable-5"
prompt = """
Review the changes made for work item {{work_item_number}} in the previous steps for correctness, completeness, security, and style. Address major issues or gaps automatically, but you MUST ask me for clarification if anything is unclear or if there are diverging possible solutions or spec mismatches. Then suggest minor improvements/nits if needed for my approval. Ensure all edge cases are considered:

{{work_item_section:[Edge Case Considerations]}}

Ensure tests were implemented as described below:

{{work_item_section:[Test Considerations]}}

When complete, provide a short manual test plan and give me a chance to manually test and make any tweaks needed with freeform chat.
"""
