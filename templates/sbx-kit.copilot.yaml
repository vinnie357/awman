# awman-generated Docker Sandbox kit — agent: copilot (kind: mixin)
# Rendered by DSbxKitEmitter at `awman ready`. Do not edit by hand inside a kit
# directory; edit the template and re-run `awman ready`.
# awman version: {{AWMAN_VERSION}}
kind: mixin
extends: copilot
persistence: persistent
network:
  allowedDomains:
    - api.githubcopilot.com
    - api.github.com
    - registry.npmjs.org
credentials:
  sources:
    GITHUB_TOKEN: github
environment:
  proxyManaged:
    - GITHUB_TOKEN
memory: |
  This sandbox is orchestrated by awman {{AWMAN_VERSION}} using the
  Docker Sandboxes (experimental) runtime. Per-launch configuration is read
  from ${WORKDIR}/.awman/session.json by the startup script.
commands:
  startup:
    - bash /home/agent/.awman/apply-session-config.sh
