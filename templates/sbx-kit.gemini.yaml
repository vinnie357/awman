# awman-generated Docker Sandbox kit — agent: gemini (kind: mixin)
# Rendered by DSbxKitEmitter at `awman ready`. Do not edit by hand inside a kit
# directory; edit the template and re-run `awman ready`.
# awman version: {{AWMAN_VERSION}}
schemaVersion: "1"
kind: mixin
name: awman-gemini
displayName: awman (Gemini)
description: awman-managed Gemini sandbox configuration
extends: gemini
network:
  allowedDomains:
    - generativelanguage.googleapis.com
    - registry.npmjs.org
# No credentials block: the base `gemini` kit already defines the `google`
# source, and sbx compose rejects a credential source defined in both a kit
# and a mixin extending it. awman registers the value at launch with
# `sbx secret set -g google`.
environment:
  proxyManaged:
    - GEMINI_API_KEY
agentContext: |
  This sandbox is orchestrated by awman {{AWMAN_VERSION}} using the
  Docker Sandboxes (experimental) runtime. Per-launch configuration is read
  from ${WORKDIR}/.awman/session.json by the startup script.
commands:
  startup:
    - command: ["bash", "/home/agent/.awman/apply-session-config.sh"]
      description: Apply awman per-launch session config
