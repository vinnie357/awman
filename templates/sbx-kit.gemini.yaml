kind: mixin
extends: gemini
persistence: persistent
network:
  allowedDomains:
    - generativelanguage.googleapis.com
    - registry.npmjs.org
credentials:
  sources:
    GEMINI_API_KEY: google
environment:
  proxyManaged:
    - GEMINI_API_KEY
memory: |
