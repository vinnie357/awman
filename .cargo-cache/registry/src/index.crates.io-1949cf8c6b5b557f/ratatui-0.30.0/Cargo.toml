[package]
edition = "2024"
rust-version = "1.86.0"
name = "ratatui"
version = "0.30.0"
authors = [
    "Florian Dehau <work@fdehau.com>",
    "The Ratatui Developers",
]
build = false
exclude = [
    "assets/*",
    ".github",
    "Makefile.toml",
    "CONTRIBUTING.md",
    "*.log",
    "tags",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A library that's all about cooking up terminal user interfaces"
homepage = "https://ratatui.rs"
documentation = "https://docs.rs/ratatui/latest/ratatui/"
readme = "README.md"
keywords = [
    "tui",
    "terminal",
    "dashboard",
]
categories = ["command-line-interface"]
license = "MIT"
repository = "https://github.com/ratatui/ratatui"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
cargo-args = [
    "-Zunstable-options",
    "-Zrustdoc-scrape-examples",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
all-widgets = ["widget-calendar"]
crossterm = [
    "std",
    "dep:ratatui-crossterm",
]
crossterm_0_28 = [
    "crossterm",
    "ratatui-crossterm/crossterm_0_28",
]
crossterm_0_29 = [
    "crossterm",
    "ratatui-crossterm/crossterm_0_29",
]
default = [
    "crossterm",
    "underline-color",
    "all-widgets",
    "macros",
    "layout-cache",
]
layout-cache = [
    "std",
    "ratatui-core/layout-cache",
]
macros = ["dep:ratatui-macros"]
palette = [
    "std",
    "ratatui-core/palette",
    "dep:palette",
]
portable-atomic = ["ratatui-core/portable-atomic"]
scrolling-regions = [
    "ratatui-core/scrolling-regions",
    "ratatui-crossterm?/scrolling-regions",
    "ratatui-termion?/scrolling-regions",
    "ratatui-termwiz?/scrolling-regions",
]
serde = [
    "std",
    "dep:serde",
    "ratatui-core/serde",
    "ratatui-widgets/serde",
    "ratatui-crossterm?/serde",
    "ratatui-termion?/serde",
    "ratatui-termwiz?/serde",
]
std = [
    "ratatui-core/std",
    "ratatui-widgets/std",
]
termion = [
    "std",
    "dep:ratatui-termion",
]
termwiz = [
    "std",
    "dep:ratatui-termwiz",
]
underline-color = [
    "ratatui-core/underline-color",
    "ratatui-crossterm?/underline-color",
    "ratatui-termwiz?/underline-color",
]
unstable = [
    "unstable-rendered-line-info",
    "unstable-widget-ref",
    "unstable-backend-writer",
]
unstable-backend-writer = [
    "ratatui-crossterm?/unstable-backend-writer",
    "ratatui-termion?/unstable-backend-writer",
]
unstable-rendered-line-info = ["ratatui-widgets/unstable-rendered-line-info"]
unstable-widget-ref = []
widget-calendar = ["ratatui-widgets/calendar"]

[lib]
name = "ratatui"
path = "src/lib.rs"
bench = false

