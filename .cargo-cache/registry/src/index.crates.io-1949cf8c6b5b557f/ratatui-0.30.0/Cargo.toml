[dependencies.ratatui-macros]
version = "0.7.0"
optional = true

[dependencies.ratatui-termwiz]
version = "0.1.0"
optional = true

[dependencies.ratatui-widgets]
version = "0.3.0"

[dependencies.serde]
version = "1"
features = ["derive"]
