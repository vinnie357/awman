[package]
edition = "2024"
rust-version = "1.86.0"
name = "ratatui-widgets"
version = "0.3.0"
authors = [
    "Florian Dehau <work@fdehau.com>",
    "The Ratatui Developers",
]
build = false
exclude = [
    "assets/*",
    ".github",
    "Makefile.toml",
    "CONTRIBUTING.md",
    "*.log",
    "tags",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A collection of Ratatui widgets for building terminal user interfaces using Ratatui."
homepage = "https://ratatui.rs"
documentation = "https://docs.rs/ratatui-widgets"
readme = "README.md"
keywords = [
    "tui",
    "terminal",
    "dashboard",
]
categories = ["command-line-interface"]
license = "MIT"
repository = "https://github.com/ratatui/ratatui"
resolver = "2"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
all-widgets = ["calendar"]
calendar = ["dep:time"]
default = ["all-widgets"]
serde = [
    "dep:serde",
    "ratatui-core/serde",
]
std = ["time/local-offset"]
unstable = ["unstable-rendered-line-info"]
unstable-rendered-line-info = []

[lib]
name = "ratatui_widgets"
path = "src/lib.rs"

